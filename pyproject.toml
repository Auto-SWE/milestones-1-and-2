[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[project]
name = "cpp-vulnerability-detection"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pandas~=3.0.2",
    "torch~=2.11.0",
    "transformers~=5.5.0",
]

[project.scripts]
cpp-vulnerability-detection = "src.main:main"

[tool.uv.sources]
torch = [
    { index = "pytorch-cpu", marker = "sys_platform == 'linux'" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.setuptools.packages.find]
include = ["src*"]

[dependency-groups]
dev = [
    "pandas-stubs>=3.0.0.260204",
]
